name: "Terraform CD"

on:
  push:
    branches:
      - main

env:
  PROD_STORAGE_ACCOUNT: "quiztfstateproduction"
  PROD_RESOURCE_GROUP: "quizarena-production-rg"
  PROD_CONTAINER: "terraform-state"
  PROD_STATE_KEY: "production.terraform.tfstate"
  PROD_LOCATION: "centralus"

jobs:
  terraform:
    name: "Apply Terraform"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Backend Storage Exists
        run: |
          az group create --name "${{ env.PROD_RESOURCE_GROUP }}" --location "${{ env.PROD_LOCATION }}"
          az storage account create --resource-group "${{ env.PROD_RESOURCE_GROUP }}" --name "${{ env.PROD_STORAGE_ACCOUNT }}" --sku Standard_LRS --encryption-services blob
          az storage container create --name "${{ env.PROD_CONTAINER }}" --account-name "${{ env.PROD_STORAGE_ACCOUNT }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./Terraform
        env:
          ARM_CLIENT_ID: ${{ jsonParse(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ jsonParse(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ jsonParse(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ jsonParse(secrets.AZURE_CREDENTIALS).tenantId }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.PROD_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.PROD_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.PROD_CONTAINER }}" \
            -backend-config="key=${{ env.PROD_STATE_KEY }}"

      - name: Terraform Apply
        working-directory: ./Terraform
        env:
          ARM_CLIENT_ID: ${{ jsonParse(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ jsonParse(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ jsonParse(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ jsonParse(secrets.AZURE_CREDENTIALS).tenantId }}
        run: terraform apply -var="ai_api_key=${{ secrets.AI_API_KEY_SECRET }}" -auto-approve