name: "Terraform CD"

on:
  push:
    branches:
      - main

env:
  TF_STATE_STORAGE_ACCOUNT: "quizarenatfstate2026" 

jobs:
  terraform:
    name: "Apply Terraform"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE_ACCOUNT }}"

      - name: Terraform Apply
        run: terraform apply -var="ai_api_key_secret=${{ secrets.AI_API_KEY_SECRET }}" -auto-approve